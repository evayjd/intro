<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Thought Bubble Demo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #f3e693, #fbf8b1);
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* 人物 */
    .character {
      position: absolute;
      left: 40px;
      bottom: 0;
      width: 300px;
      z-index: 2;
    }

    /* 话框 */
    .cloud {
      position: absolute;
      top: 80px;
      right: 240px;

      width: fit-content;
      min-height: 360px;

      padding: 50px 35px;
      background: #ffe5fc;
      color: #647dbe;

      border-radius: 80px;
      box-shadow: 0 40px 80px rgba(173, 153, 201, 0.35);
      z-index: 0;
    }
    .cloud::after {
      content: "";
      position: absolute;
      left: -28px;    
      bottom: 90px;   

      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-right: 28px solid #f8d6f4;

    }

    /* 文本 */
    .cloud p {
      font-size: 20px;
      line-height: 1.9;
      margin: 0 0 24px 0;
      max-width: 520px;
    }

    /* 语言选择 */
    select {
      font-size: 14px;
      padding: 6px 10px;
    }
  </style>
</head>

<body>
<div id="app">

  <!-- 云朵气泡 -->
  <div class="cloud">
    <p>{{ text[lang] }}</p>

    <select v-model="lang">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
  </div>

  <!-- 人物 -->
  <img class="character" src="./me.png" alt="me" />

</div>

<script>
const { createApp } = Vue

createApp({
  data() {
    return {
      lang: 'zh',
      text: {
        zh: '我的名字是YujingDong，今年24岁，现在在法国生活。我喜欢拍照片，旅游，喜欢小动物，喜欢创造新东西。现在，我非常想要找到一份实习，请考虑雇佣我！',
        en: 'Hi! My name is Yujing Dong. I’m 24 years old and currently living in France. I love taking photos, exploring new places, and I have a soft spot for cute animals. I’m always excited about creating new things and trying fresh ideas. Right now, I’m actively looking for an internship — and I’d love the chance to bring my energy and creativity to your team, Please consider hiring me!',
        fr: 'Bonjour ! Je m’appelle Yujing Dong, j’ai 24 ans et je vis actuellement en France. J’adore la photographie, voyager, et j’ai un faible pour les animaux mignons. J’aime inventer, créer et tester de nouvelles idées. En ce moment, je suis à la recherche d’un stage — et j’aimerais beaucoup rejoindre votre équipe, Merci de bien vouloir considérer ma candidature'
      }
    }
  }
}).mount('#app')
</script>

</body>
</html>
